<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ECO OUEST — ARTIOM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bleu:#1565C0;--bleu-bg:#E3F2FD;
    --vert:#2E7D32;--vert-bg:#E8F5E9;
    --rouge:#D32F2F;--rouge-bg:#FFEBEE;
    --orange:#E65100;--orange-bg:#FFF3E0;
    --texte:#1A1A2E;--texte2:#546E7A;--bordure:#E0E7EF;--bg:#F0F4F8;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--texte);min-height:100vh;}
  .header{background:var(--bleu);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .header h1{font-size:15px;font-weight:700;color:#fff;}
  .header small{font-size:10px;color:#90CAF9;display:block;}
  .poseur-badge{background:rgba(255,255,255,.2);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
  .btn-back{background:none;border:none;color:#90CAF9;font-size:22px;cursor:pointer;padding:2px 8px 2px 0;}

  .screen{display:none;padding:16px;}
  .screen.active{display:block;}

  /* ÉCRAN 1 : CHOIX POSEUR */
  .welcome{text-align:center;padding:32px 20px 24px;}
  .welcome h2{font-size:20px;font-weight:700;margin-bottom:6px;}
  .welcome p{font-size:13px;color:var(--texte2);}
  .poseurs-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;}
  .poseur-btn{background:#fff;border:2px solid var(--bordure);border-radius:12px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .15s;font-family:inherit;}
  .poseur-btn:hover{border-color:var(--bleu);background:var(--bleu-bg);}
  .avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;margin:0 auto 10px;}
  .poseur-btn .name{font-size:14px;font-weight:700;}

  /* ÉCRAN 2 : LISTE CHANTIERS */
  .week-selector{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:#fff;border-radius:10px;padding:10px 14px;border:1px solid var(--bordure);}
  .week-selector label{font-size:12px;font-weight:600;color:var(--texte2);white-space:nowrap;}
  .week-input{flex:1;border:1.5px solid var(--bordure);border-radius:7px;padding:7px 10px;font-family:inherit;font-size:14px;font-weight:700;outline:none;text-align:center;}
  .week-input:focus{border-color:var(--bleu);}
  .btn-week{background:var(--bleu);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}

  .chantier-card{background:#fff;border-radius:12px;border:1px solid var(--bordure);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .chantier-info{flex:1;}
  .chantier-client{font-size:14px;font-weight:700;margin-bottom:3px;}
  .chantier-meta{font-size:11px;color:var(--texte2);}
  .pv-status{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .badge-pv-ok{background:var(--vert-bg);color:var(--vert);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;}
  .badge-pv-non{background:var(--rouge-bg);color:var(--rouge);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;}
  .btn-pv{background:var(--bleu);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;}
  .btn-pv:hover{background:#1976D2;}
  .empty{text-align:center;padding:40px 20px;color:var(--texte2);}
  .empty .icon{font-size:40px;margin-bottom:10px;}

  /* ÉCRAN 3 : FORMULAIRE PV */
  .pv-form{background:#fff;border-radius:12px;border:1px solid var(--bordure);padding:18px;}
  .pv-title{font-size:16px;font-weight:700;color:var(--bleu);margin-bottom:4px;}
  .pv-subtitle{font-size:12px;color:var(--texte2);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--bordure);}
  .form-group{margin-bottom:14px;}
  .form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--texte2);margin-bottom:5px;}
  .form-group input,.form-group textarea,.form-group select{width:100%;border:1.5px solid var(--bordure);border-radius:8px;padding:9px 12px;font-family:inherit;font-size:14px;outline:none;color:var(--texte);}
  .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--bleu);}
  .form-group textarea{resize:vertical;min-height:80px;}
  .radio-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .radio-btn{display:flex;align-items:center;gap:8px;padding:12px;border:2px solid var(--bordure);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
  .radio-btn.selected-vert{border-color:var(--vert);background:var(--vert-bg);color:var(--vert);}
  .radio-btn.selected-orange{border-color:var(--orange);background:var(--orange-bg);color:var(--orange);}
  .radio-btn input{accent-color:var(--vert);width:16px;height:16px;}

  /* SIGNATURE */
  .signature-zone{border:2px dashed var(--bordure);border-radius:10px;overflow:hidden;margin-top:6px;background:#fff;}
  .signature-zone canvas{display:block;width:100%;touch-action:none;}
  .sig-toolbar{display:flex;gap:8px;margin-top:8px;}
  .btn-clear{background:var(--rouge-bg);color:var(--rouge);border:none;border-radius:7px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
  .sig-hint{font-size:11px;color:var(--texte2);margin-top:6px;text-align:center;font-style:italic;}

  /* BOUTONS */
  .btn-generate{width:100%;padding:16px;background:var(--bleu);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:18px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-generate:hover{background:#1976D2;}
  .btn-generate:disabled{background:#90CAF9;cursor:not-allowed;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:999;display:none;}
  .toast.show{display:block;}

  .section-divider{background:var(--bleu);color:#fff;text-align:center;padding:8px;font-size:11px;font-weight:700;letter-spacing:2px;border-radius:6px;margin:16px 0 12px;}
  .loader{text-align:center;padding:32px;color:var(--texte2);}
  .spinner{width:28px;height:28px;border:3px solid var(--bleu-bg);border-top-color:var(--bleu);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* POSEUR EXTRA */
  .statut-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .statut-btn{padding:10px;border-radius:8px;border:2px solid var(--bordure);background:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s;}
  .statut-btn.active-vert{border-color:var(--vert);background:var(--vert-bg);color:var(--vert);}
  .statut-btn.active-orange{border-color:var(--orange);background:var(--orange-bg);color:var(--orange);}
  .statut-btn.active-rouge{border-color:var(--rouge);background:var(--rouge-bg);color:var(--rouge);}
  .statut-btn.active-jaune{border-color:var(--jaune);background:var(--jaune-bg);color:#856404;}
  .checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .checkbox-item{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:8px;padding:10px 12px;cursor:pointer;border:1.5px solid transparent;transition:all .12s;}
  .checkbox-item.checked{background:var(--vert-bg);border-color:var(--vert);}
  .checkbox-item input{accent-color:var(--vert);width:16px;height:16px;cursor:pointer;}
  .checkbox-item label{font-size:13px;font-weight:500;cursor:pointer;}
  .btn-save{width:100%;padding:14px;background:var(--bleu);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-save:hover{background:#1976D2;}
  .sync-bar{background:var(--vert-bg);color:var(--vert);padding:8px 20px;font-size:12px;font-weight:600;text-align:center;display:none;}
  .sync-bar.show{display:block;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:999;display:none;}
  .toast.show{display:block;}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="btn-back" id="btn-back" onclick="goBack()" style="display:none">←</button>
    <div>
      <h1>ECO OUEST — ARTIOM</h1>
      <small id="header-sub">Mes chantiers du jour</small>
    </div>
  </div>
  <div class="poseur-badge" style="display:block;background:#2E7D32">ARTIOM</div>
</div>

<div class="sync-bar" id="sync-bar">✅ Enregistré !</div>
<div class="toast" id="toast"></div>

<!-- ÉCRAN CHANTIERS -->
<div class="screen active" id="screen-chantiers">
  <div class="week-selector">
    <label>Semaine :</label>
    <input type="number" class="week-input" id="week-input" min="1" max="53" placeholder="26">
    <button class="btn-week" onclick="filtrerSemaine()">🔍 Voir</button>
  </div>
  <div id="chantiers-list">
    <div class="loader"><div class="spinner"></div>Chargement...</div>
  </div>
</div>

<!-- ÉCRAN AVANCEMENT -->
<div class="screen" id="screen-avancement">
  <div id="avancement-form"></div>
</div>

<!-- ÉCRAN PV -->
<div class="screen" id="screen-pv">
  <div class="pv-form">
    <div class="pv-title">Constat de Réception des Travaux</div>
    <div class="pv-subtitle">D'ECO OUEST · 153 av. du Général Leclerc · 78220 VIROFLAY</div>
    <div class="form-group"><label>Client *</label><input type="text" id="pv-client"></div>
    <div class="form-group"><label>N° Contrat / Devis</label><input type="text" id="pv-contrat"></div>
    <div class="form-group"><label>Date</label><input type="date" id="pv-date"></div>
    <div class="form-group"><label>Adresse chantier</label><input type="text" id="pv-adresse"></div>
    <div class="form-group"><label>Poseur</label><input type="text" id="pv-poseur" readonly style="background:var(--bg);"></div>
    <div class="section-divider">RÉCEPTION</div>
    <div class="form-group">
      <label>La réception est prononcée</label>
      <div class="radio-group">
        <div class="radio-btn" id="rb-sans" onclick="selReception('sans')"><input type="radio" name="reception" value="sans"> Sans réserve ✅</div>
        <div class="radio-btn" id="rb-avec" onclick="selReception('avec')"><input type="radio" name="reception" value="avec"> Avec réserve ⚠️</div>
      </div>
    </div>
    <div class="section-divider">COMMENTAIRES</div>
    <div class="form-group"><label>Commentaires / Réserves</label><textarea id="pv-commentaires"></textarea></div>
    <div class="section-divider">RÈGLEMENT</div>
    <div class="form-group"><label>Modalités de règlement</label><textarea id="pv-reglement"></textarea></div>
    <div class="section-divider">SIGNATURE DU CLIENT</div>
    <div class="form-group"><label>Fait à</label><input type="text" id="pv-lieu" value="Viroflay"></div>
    <div class="form-group">
      <label>Signature du Maître de l'ouvrage</label>
      <div class="signature-zone"><canvas id="sig-canvas" height="160"></canvas></div>
      <div class="sig-toolbar"><button class="btn-clear" onclick="clearSignature()">🗑 Effacer</button></div>
    </div>
    <button class="btn-generate" id="btn-generate" onclick="genererPDF()">📄 Générer le PV</button>
    <button class="btn-generate" id="btn-mail" onclick="envoyerMail()" style="background:#0078D4;margin-top:10px;display:none;">📧 Envoyer par Outlook</button>
  </div>
</div>

<script>
var WEBAPP = 'https://script.google.com/macros/s/AKfycbxk1zFKVsCDoiN5J4RAZYF-9nEYqGMIypS2lqBooqZWkxwMUGo8JVq5-iS9ZvZUGasa/exec';
var poseurActuel = 'ARTIOM';
var colPoseur = 18;
var allChantiers = [];
var chantierActuel = null;
var sigCanvas, sigCtx, sigDrawing = false, sigHasSig = false;
var photosEnAttente = {};
var STATUTS = [
  {label:'Termine ✅', cls:'active-vert', val:'Termine'},
  {label:'En cours 🔧', cls:'active-orange', val:'En cours'},
  {label:'A planifier 📅', cls:'active-jaune', val:'A planifier'},
  {label:'SAV ⚠️', cls:'active-rouge', val:'SAV'},
];
var TYPES_POSE = ['Fenetre','Porte','Volet','Porte-fenetre','Baie vitree','Velux','Portail','Store','Autre'];

// ── NAVIGATION ────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}

function goBack() {
  var active = document.querySelector('.screen.active');
  if (active.id === 'screen-pv') {
    showScreen('screen-avancement');
    document.getElementById('header-sub').textContent = chantierActuel ? chantierActuel.client : 'Avancement';
  } else if (active.id === 'screen-avancement') {
    showScreen('screen-chantiers');
    document.getElementById('header-sub').textContent = 'Mes chantiers du jour';
    document.getElementById('btn-back').style.display = 'none';
  }
}

function goBackFromPV() {
  showScreen('screen-avancement');
}

// ── CHARGEMENT JSONP ──────────────────────────────────────
window.addEventListener('load', function() {
  var sem = getWeekNum(new Date());
  document.getElementById('week-input').value = sem;
  chargerChantiers();
});

function chargerChantiers() {
  document.getElementById('chantiers-list').innerHTML = '<div class="loader"><div class="spinner"></div>Chargement...</div>';
  var old = document.getElementById('jsonp-poseur');
  if (old) old.parentNode.removeChild(old);
  var timeout = setTimeout(function() {
    document.getElementById('chantiers-list').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Erreur de connexion.</p></div>';
  }, 15000);
  window._poseurCallback = function(d) {
    clearTimeout(timeout);
    if (!d.ok) {
      document.getElementById('chantiers-list').innerHTML = '<div class="empty"><p>Erreur: ' + (d.error||'inconnue') + '</p></div>';
      return;
    }
    allChantiers = d.data.filter(function(c) {
      return (c.commentaireARC||'').toUpperCase() !== 'ANNULER';
    });
    filtrerSemaine();
  };
  var script = document.createElement('script');
  script.id = 'jsonp-poseur';
  script.src = WEBAPP + '?callback=_poseurCallback&t=' + Date.now();
  script.onerror = function() {
    clearTimeout(timeout);
    document.getElementById('chantiers-list').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Erreur de connexion.</p></div>';
  };
  document.head.appendChild(script);
}

function getWeekNum(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  var y = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-y)/86400000)+1)/7);
}

function normaliserDate(s) {
  if (!s) return '';
  s = s.trim();
  if (s.match(/^\d{4}-\d{2}-\d{2}/)) { var p=s.slice(0,10).split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
  if (s.match(/^\d{2}\/\d{2}\/\d{4}/)) return s.slice(0,10);
  return s;
}

function filtrerSemaine() {
  var semStr = document.getElementById('week-input').value;
  if (!semStr) return;
  var sem = parseInt(semStr, 10);
  var today = new Date();
  var dateAujourd = today.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'});

  var filtered = allChantiers.filter(function(c) {
    var dp = (c.datePose||'').trim();
    if (!dp) return false;
    var mSem = dp.match(/S\s*0*(\d{1,2})/i);
    if (mSem) return parseInt(mSem[1],10) === sem;
    var d = new Date(dp);
    if (!isNaN(d)) return getWeekNum(d) === sem;
    return false;
  });

  if (!filtered.length) {
    var d2 = new Date(); d2.setDate(d2.getDate() + (sem - getWeekNum(d2)) * 7);
    document.getElementById('chantiers-list').innerHTML = '<div class="empty"><div class="icon">📅</div><p>Aucun chantier pour la semaine S' + sem + '.</p></div>';
    return;
  }

  document.getElementById('chantiers-list').innerHTML = filtered.slice().reverse().map(function(c) {
    var pvFait = (c.pvChantier||'').toUpperCase() === 'OUI';
    return '<div class="chantier-card">' +
      '<div class="chantier-info">' +
      '<div class="chantier-client">' + h(c.client) + '</div>' +
      '<div class="chantier-meta">' + (c.fournisseur||'') + (c.devis?' · '+c.devis:'') + (c.datePose?' · 📅 '+c.datePose:'') + '</div>' +
      '</div>' +
      '<div class="pv-status">' +
      (pvFait ? '<span class="badge-pv-ok">✓ PV fait</span>' : '<span class="badge-pv-non">✗ PV manquant</span>') +
      '<button class="btn-pv" style="background:#2E7D32;" onclick="ouvrirAvancement(' + JSON.stringify(c).replace(/"/g, "&quot;") + ')">✏️ Avancement</button>' +
      '<button class="btn-pv" onclick="ouvrirPV(' + JSON.stringify(c).replace(/"/g, "&quot;") + ')">📋 Faire PV</button>' +
      '</div></div>';
  }).join('');
}

// ── AVANCEMENT ────────────────────────────────────────────
function ouvrirAvancement(c) {
  chantierActuel = c;
  document.getElementById('header-sub').textContent = c.client;
  document.getElementById('btn-back').style.display = 'block';

  var statutSel = c.statutPose || '';
  var html = '<div style="padding:16px;">';
  html += '<div style="font-size:16px;font-weight:700;margin-bottom:4px;">' + h(c.client) + '</div>';
  html += '<div style="font-size:12px;color:var(--texte2);margin-bottom:16px;">' + h(c.fournisseur||'') + (c.datePose?' · 📅 '+c.datePose:'') + '</div>';

  if (c.commentaire) {
    html += '<div style="padding:10px 12px;background:#FFF3E0;border-radius:8px;border-left:3px solid var(--orange);margin-bottom:14px;">';
    html += '<div style="font-size:11px;font-weight:700;color:var(--orange);">📋 NOTE BUREAU</div>';
    html += '<div style="font-size:12px;margin-top:4px;">' + h(c.commentaire) + '</div></div>';
  }

  html += '<div class="section-title">Statut du chantier</div>';
  html += '<div class="statut-grid">' + STATUTS.map(function(s) {
    var isSel = statutSel.toLowerCase() === s.val.toLowerCase();
    return '<button class="statut-btn' + (isSel?' '+s.cls:'') + '" id="statut-' + c.ligne + '-' + s.val + '" onclick="selStatut(' + c.ligne + ',\'' + s.val + '\',\'' + s.cls + '\')">' + s.label + '</button>';
  }).join('') + '</div>';

  html += '<div class="section-title">Elements poses</div>';
  html += '<div class="checkbox-grid">' + TYPES_POSE.map(function(t) {
    return '<div class="checkbox-item" id="chk-' + c.ligne + '-' + t + '" onclick="toggleCheck(' + c.ligne + ',\'' + t + '\')">' +
      '<input type="checkbox" id="cb-' + c.ligne + '-' + t + '" onclick="event.stopPropagation()"><label>' + t + '</label></div>';
  }).join('') + '</div>';

  html += '<div class="section-title">Pieces concernees</div>';
  html += '<input class="input-field" id="pieces-' + c.ligne + '" type="text" placeholder="Salon, Chambre 1...">';

  html += '<div class="section-title">Ce qui reste a faire</div>';
  html += '<textarea class="input-field" id="reste-' + c.ligne + '" placeholder="Details..."></textarea>';

  html += '<div class="section-title">Mon suivi (historique)</div>';
  html += '<div class="historique" id="histo-' + c.ligne + '">' + h(c['poseur_' + poseurActuel] || '') + '</div>';

  html += '<div class="section-title">Ajouter un commentaire</div>';
  html += '<textarea class="input-field" id="comment-' + c.ligne + '" placeholder="Nouvelle remarque..."></textarea>';

  html += '<div style="padding:12px;background:var(--vert-bg);border-radius:10px;border:1.5px solid var(--vert);margin-top:14px;">';
  html += '<label style="display:flex;align-items:center;gap:10px;cursor:pointer;">';
  html += '<input type="checkbox" id="pv-cb-' + c.ligne + '" ' + ((c.pvChantier||'').toUpperCase()==='OUI'?'checked':'') + ' style="width:20px;height:20px;accent-color:var(--vert);cursor:pointer;">';
  html += '<span style="font-size:14px;font-weight:700;color:var(--vert);">✓ PV de fin de chantier effectue</span>';
  html += '</label></div>';

  html += '<button class="btn-save" onclick="enregistrer(' + c.ligne + ')">💾 Enregistrer mon avancement</button>';
  html += '<button style="width:100%;padding:14px;background:#1565C0;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;" onclick="ouvrirPV(' + JSON.stringify(c).replace(/"/g, '&quot;') + ')">📋 Faire le PV de reception</button>';
  html += '</div>';

  document.getElementById('avancement-form').innerHTML = html;
  showScreen('screen-avancement');
}

function selStatut(ligne, val, cls) {
  STATUTS.forEach(function(s) {
    var btn = document.getElementById('statut-' + ligne + '-' + s.val);
    if (btn) btn.className = 'statut-btn' + (s.val === val ? ' ' + cls : '');
  });
}

function toggleCheck(ligne, type) {

async function enregistrer(ligne) {
  var btn = document.querySelector('#avancement-form .btn-save');
  if (btn) { btn.disabled=true; btn.textContent='Enregistrement...'; }

  var statutSel = '';
  STATUTS.forEach(function(s) {
    var b = document.getElementById('statut-' + ligne + '-' + s.val);
    if (b && b.className.indexOf('active') !== -1) statutSel = s.val;
  });

  var typesCochesList = TYPES_POSE.filter(function(t) {
    var cb = document.getElementById('cb-' + ligne + '-' + t);
    return cb && cb.checked;
  });

  var pieces  = (document.getElementById('pieces-' + ligne)||{}).value||'';
  var reste   = (document.getElementById('reste-' + ligne)||{}).value||'';
  var newComment = (document.getElementById('comment-' + ligne)||{}).value||'';
  var pvCb    = document.getElementById('pv-cb-' + ligne);
  var pvVal   = pvCb && pvCb.checked ? 'OUI' : 'NON';

  var histo = document.getElementById('histo-' + ligne);
  var histoText = histo ? histo.textContent : '';
  var now = new Date();
  var dateStr = now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var lignes2 = [];
  if (statutSel) lignes2.push('Statut: ' + statutSel);
  if (typesCochesList.length) lignes2.push('Pose: ' + typesCochesList.join(', '));
  if (pieces.trim()) lignes2.push('Pieces: ' + pieces.trim());
  if (reste.trim()) lignes2.push('Reste: ' + reste.trim());
  if (newComment.trim()) lignes2.push(newComment.trim());

  var nouvelleLigne = lignes2.length ? '[' + dateStr + ' - ' + poseurActuel + '] ' + lignes2.join(' | ') : '';
  var commentaireFinal = histoText ? histoText + (nouvelleLigne ? '\n' + nouvelleLigne : '') : nouvelleLigne;

  var champs = {};
  if (statutSel) champs[13] = statutSel;
  champs[16] = pvVal;
  if (commentaireFinal) champs[colPoseur] = commentaireFinal;

  try {
    var r = await fetch(WEBAPP, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({action:'modifier', ligne:ligne, champs:champs}),
      redirect:'follow'
    });
    var d = await r.json();
    if (!d.ok) throw new Error(d.error);
    if (histo) histo.textContent = commentaireFinal;
    var cmtEl = document.getElementById('comment-' + ligne);
    if (cmtEl) cmtEl.value = '';
    showToast('✅ Avancement enregistre !');
    showSyncBar();
  } catch(e) {
    showToast('❌ Erreur : ' + e.message);
  }

  if (btn) { btn.disabled=false; btn.textContent='💾 Enregistrer mon avancement'; }
}

// ── CHARGEMENT ────────────────────────────────────────────
async function chargerChantiers() {
  document.getElementById('chantiers-list').innerHTML = '<div class="loader"><div class="spinner"></div>Chargement...</div>';
  try {
    var r = await fetch(WEBAPP, {redirect:'follow'});
    var d = await r.json();
    if (!d.ok) throw new Error(d.error);
    allChantiers = d.data.filter(function(c) {
      return (c.commentaireARC||'').toUpperCase() !== 'ANNULER';
    });
    filtrerSemaine();
  } catch(e) {
    document.getElementById('chantiers-list').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Erreur de connexion.</p></div>';
  }
}

function getWeekNum(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  var y = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d-y)/86400000)+1)/7);
}

function filtrerSemaine() {
  var semStr = document.getElementById('week-input').value;
  if (!semStr) return;
  var sem = parseInt(semStr, 10);

  var filtered = allChantiers.filter(function(c) {
    var dp = (c.datePose||'').trim();
    if (!dp) return false;
    var mSem = dp.match(/S\s*0*(\d{1,2})/i);
    if (mSem) return parseInt(mSem[1],10) === sem;
    // Date précise
    var d = new Date(dp);
    if (!isNaN(d)) return getWeekNum(d) === sem;
    return false;
  });

  if (!filtered.length) {
    document.getElementById('chantiers-list').innerHTML =
      '<div class="empty"><div class="icon">📅</div><p>Aucun chantier trouvé pour la semaine S'+sem+'.</p></div>';
    return;
  }

  document.getElementById('chantiers-list').innerHTML = filtered.map(function(c, i) {
    var pvFait = (c.pvChantier||'').toUpperCase() === 'OUI';
    return '<div class="chantier-card">'
      + '<div class="chantier-info">'
      + '<div class="chantier-client">'+h(c.client)+'</div>'
      + '<div class="chantier-meta">'+(c.fournisseur||'')+(c.devis?' · '+c.devis:'')+(c.datePose?' · 📅 '+c.datePose:'')+'</div>'
      + '</div>'
      + '<div class="pv-status">'
      + (pvFait ? '<span class="badge-pv-ok">✓ PV fait</span>' : '<span class="badge-pv-non">✗ PV manquant</span>')
      + '<button class="btn-pv" onclick="ouvrirPV('+JSON.stringify(c).replace(/"/g,'&quot;')+')">📋 '+(pvFait?'Voir PV':'Faire PV')+'</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ── SIGNATURE ─────────────────────────────────────────────
function initSignature() {
  sigCanvas = document.getElementById('sig-canvas');
  sigCanvas.width = sigCanvas.offsetWidth;
  sigCtx = sigCanvas.getContext('2d');
  sigCtx.strokeStyle = '#1A1A2E';
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
  sigDrawing = false;
  sigHasSig = false;

  sigCanvas.addEventListener('mousedown',  startDraw);
  sigCanvas.addEventListener('mousemove',  draw);
  sigCanvas.addEventListener('mouseup',    endDraw);
  sigCanvas.addEventListener('touchstart', startDraw, {passive:false});
  sigCanvas.addEventListener('touchmove',  draw,      {passive:false});
  sigCanvas.addEventListener('touchend',   endDraw);
}

function getPos(e) {
  var rect = sigCanvas.getBoundingClientRect();
  var touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function startDraw(e) { e.preventDefault(); sigDrawing=true; var p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); }
function draw(e)       { e.preventDefault(); if(!sigDrawing)return; var p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); sigHasSig=true; }
function endDraw(e)    { e.preventDefault(); sigDrawing=false; }
function clearSignature(){ if(sigCtx) sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height); sigHasSig=false; }
